name: Validate Content

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run content validator
        run: node tools/validate-content.mjs
